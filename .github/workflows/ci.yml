name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install uv without pip
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # Install deps using uv (system install so tools are on PATH)
      - name: Install deps
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy src/textkit

      - name: Tests
        run: pytest -q