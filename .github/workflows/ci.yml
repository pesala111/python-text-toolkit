name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install deps
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src/textkit

      - name: Tests
        run: uv run pytest -q